<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>message</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 90'%3E%3Cpath d='M50,80 C50,80 8,54 8,30 C8,16 20,10 30,10 C40,10 50,20 50,28 C50,20 60,10 70,10 C80,10 92,16 92,30 C92,54 50,80 50,80 Z' fill='%23ff5c8a'/%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Mali:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  @font-face{
    font-family:'FFVelvet';
    src:url('FFVelvet.woff2') format('woff2'),
        url('FFVelvet.woff') format('woff'),
        url('FFVelvet.ttf') format('truetype'),
        url('FFVelvet.otf') format('opentype');
    font-weight:normal;font-display:swap;
  }
  *{margin:0;padding:0;box-sizing:border-box;font-family:'FFVelvet','Mali',sans-serif}
  html,body{height:100%;overflow:hidden;background:#0a0a14}
  body{font-family:'FFVelvet','Mali',sans-serif;color:#fff;position:relative}

  /* ===================================================== */
  /* ฉากเว็บหลัก (ภาพจริง)                                  */
  /* ===================================================== */
  #cine{position:fixed;inset:0;overflow:hidden;background:#0a0a14}
  .bgBlur{position:absolute;inset:-8%;background:center/cover no-repeat;
    filter:blur(26px) brightness(.6) saturate(1.3);transform:scale(1.12)}
  .bg{position:absolute;inset:0;background:center/cover no-repeat;
    filter:saturate(1.28) contrast(1.07) brightness(1.05);transform-origin:50% 50%;
    transform:translate3d(0,0,0) scale(1.08);will-change:transform;backface-visibility:hidden}

  .grade{position:absolute;inset:0;mix-blend-mode:soft-light;opacity:.35;
    background:linear-gradient(130deg, rgba(255,150,190,0.4), rgba(90,160,255,0.4) 60%, rgba(150,110,255,0.35))}
  .glowTop{position:absolute;inset:0;mix-blend-mode:screen;opacity:.35;
    background:radial-gradient(70% 50% at 50% 28%, rgba(255,245,225,0.5), transparent 70%)}
  /* แสงกวาดเฉียง */
  .rays{position:absolute;inset:0;mix-blend-mode:screen;opacity:.5;pointer-events:none;
    background:linear-gradient(115deg, transparent 42%, rgba(255,255,255,0.08) 49%, transparent 57%);
    background-size:300% 100%;animation:raySweep 11s linear infinite}
  @keyframes raySweep{from{background-position:120% 0}to{background-position:-120% 0}}

  canvas.fx{position:absolute;pointer-events:none;z-index:3}  /* ขนาด/ตำแหน่งตั้งโดย JS ให้พอดีกรอบรูป */
  .vignette{position:absolute;inset:0;z-index:5;pointer-events:none;
    background:radial-gradient(125% 105% at 50% 46%, transparent 56%, rgba(0,0,0,0.6) 100%)}

  /* ข้อความ */
  .content{position:absolute;inset:0;z-index:9;display:flex;flex-direction:column;
    align-items:center;justify-content:center;text-align:center;padding:26px}
  .heartSvg{width:clamp(120px,20vw,212px);height:auto;margin-bottom:24px;transform-origin:center;
    filter:drop-shadow(0 0 16px rgba(255,195,228,.9)) drop-shadow(0 0 44px rgba(160,195,255,.65));
    animation:heartFloat 3.6s ease-in-out infinite}
  @keyframes heartFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-6px) scale(1.04)}}
  .heartSvg path{fill:none;stroke:#fff2f8;stroke-width:3.4;stroke-linecap:round;
    stroke-dasharray:340;stroke-dashoffset:340;animation:drawHeart 2s ease forwards .3s;animation-play-state:paused}
  @keyframes drawHeart{to{stroke-dashoffset:0}}
  h1{font-family:'FFVelvet','Mali',sans-serif;font-weight:600;font-size:clamp(24px,4.4vw,46px);
    line-height:1.25;margin:2px 0 9px;color:#fff;letter-spacing:1px;
    text-shadow:0 2px 18px rgba(0,0,0,.5),0 0 28px rgba(180,205,255,.3)}
  .sub{font-family:'FFVelvet','Mali',sans-serif;font-weight:400;
    font-size:clamp(13px,2.5vw,17px);color:#eef4ff;letter-spacing:1.5px;opacity:.9;text-shadow:0 2px 16px rgba(0,0,0,.6)}
  .rise{opacity:0;transform:translateY(26px);animation:rise 1.5s cubic-bezier(.2,.8,.2,1) forwards;animation-play-state:paused}
  .r1{animation-delay:.2s}.r2{animation-delay:.7s}.r3{animation-delay:1.2s}
  @keyframes rise{to{opacity:1;transform:none}}
  body.entered .rise,body.entered .heartSvg path{animation-play-state:running}

  /* ===================================================== */
  /* ฉากเปิด : ซองจดหมาย                                    */
  /* ===================================================== */
  #intro{position:fixed;inset:0;z-index:40;display:flex;flex-direction:column;
    align-items:center;justify-content:center;gap:34px;cursor:pointer;
    background:radial-gradient(120% 90% at 50% 40%, #3a2b4f, #1a1230 70%, #120c22);
    transition:opacity .7s ease}
  #intro.gone{opacity:0;pointer-events:none}
  .introGlow{position:absolute;width:60vmin;height:60vmin;border-radius:50%;
    background:radial-gradient(circle,rgba(255,205,225,.35),transparent 65%);filter:blur(20px);animation:breathe 4s ease-in-out infinite}
  @keyframes breathe{0%,100%{transform:scale(1);opacity:.7}50%{transform:scale(1.12);opacity:1}}

  .env{position:relative;width:min(82vw,400px);height:min(54vw,264px);
    animation:floatE 4s ease-in-out infinite;filter:drop-shadow(0 24px 40px rgba(0,0,0,.5))}
  @keyframes floatE{0%,100%{transform:translateY(0)}50%{transform:translateY(-12px)}}

  .backPanel{position:absolute;inset:0;border-radius:12px;background:linear-gradient(160deg,#f3e8c8,#e7d6ab);z-index:0}
  .letter{position:absolute;left:6%;top:7%;width:88%;height:82%;border-radius:7px;z-index:2;
    background:linear-gradient(160deg,#fffdf6,#fbf2dd);box-shadow:0 6px 20px rgba(0,0,0,.28);
    display:flex;align-items:center;justify-content:center;
    transition:transform .9s cubic-bezier(.2,.9,.25,1) .25s, opacity .6s ease .9s}
  .letter .lh{font-size:40px;color:#e7799f;filter:drop-shadow(0 0 8px rgba(231,121,159,.5))}
  .front{position:absolute;bottom:0;left:0;width:100%;height:64%;z-index:3;border-radius:0 0 10px 10px;
    background:linear-gradient(160deg,#efe1bb,#e2d09c);
    clip-path:polygon(0 22%,50% 0,100% 22%,100% 100%,0 100%);
    box-shadow:inset 0 6px 14px rgba(255,255,255,.25)}
  .flap{position:absolute;top:0;left:0;width:100%;height:54%;z-index:4;transform-origin:top center;
    background:linear-gradient(160deg,#f1e3bf,#e4d29e);border-radius:12px 12px 0 0;
    clip-path:polygon(0 0,100% 0,50% 100%);transition:transform .7s ease,z-index 0s .35s}
  .seal{position:absolute;top:42%;left:50%;transform:translate(-50%,-50%);z-index:6;width:74px;height:74px;
    transition:transform .4s ease,opacity .4s ease;animation:sealPulse 2.2s ease-in-out infinite}
  @keyframes sealPulse{0%,100%{filter:drop-shadow(0 0 6px rgba(255,90,140,.6))}50%{filter:drop-shadow(0 0 16px rgba(255,120,165,.95))}}

  /* สถานะเปิด */
  .env.open .seal{transform:translate(-50%,-50%) scale(0) rotate(40deg);opacity:0}
  .env.open .flap{transform:rotateX(-178deg);z-index:0}
  .env.open .letter{transform:translateY(-58%) scale(1.06)}

  .hint{font-size:clamp(20px,5.5vw,28px);color:#ffe7f1;text-shadow:0 2px 12px rgba(0,0,0,.5);
    animation:hintPulse 1.8s ease-in-out infinite;z-index:1}
  @keyframes hintPulse{0%,100%{opacity:.65;transform:translateY(0)}50%{opacity:1;transform:translateY(-4px)}}

  /* แฟลชตอนเปิด */
  #flash{position:fixed;inset:0;z-index:45;background:#fff;opacity:0;pointer-events:none}
  #flash.go{animation:flash 1s ease forwards}
  @keyframes flash{0%{opacity:0}25%{opacity:.85}100%{opacity:0}}

  /* หัวใจลอย */
  .fheart{position:fixed;bottom:-40px;z-index:8;pointer-events:none;opacity:0}
</style>
</head>
<body>

<!-- ===== ฉากเว็บหลัก ===== -->
<div id="cine">
  <div class="bgBlur" id="bgBlur"></div>
  <div class="bg" id="bg"></div>
  <div class="grade"></div>
  <div class="glowTop"></div>
  <div class="rays"></div>
  <canvas id="bokeh" class="fx"></canvas>
  <div class="vignette"></div>
  <div class="content">
    <svg class="heartSvg rise r1" viewBox="0 0 100 90"><path d="M50,78 C50,78 8,52 8,28 C8,14 20,8 30,8 C40,8 50,18 50,26 C50,18 60,8 70,8 C80,8 92,14 92,28 C92,52 50,78 50,78 Z"/></svg>
    <h1 class="rise r2" id="title">ขอโทษนะ</h1>
    <div class="sub rise r3" id="sub">ถึงแฟนคนเก่งของเรา</div>
  </div>
</div>

<!-- ===== ฉากเปิด : ซองจดหมาย ===== -->
<div id="intro">
  <div class="introGlow"></div>
  <div class="env" id="env">
    <div class="backPanel"></div>
    <div class="letter"><span class="lh">&#10084;&#65038;</span></div>
    <div class="front"></div>
    <div class="flap"></div>
    <svg class="seal" viewBox="0 0 100 100">
      <defs><radialGradient id="wax" cx="40%" cy="35%" r="70%">
        <stop offset="0" stop-color="#ff8fb0"/><stop offset="55%" stop-color="#e83e6b"/><stop offset="100%" stop-color="#b71f49"/></radialGradient></defs>
      <circle cx="50" cy="50" r="46" fill="url(#wax)" stroke="#a01840" stroke-width="2"/>
      <circle cx="50" cy="50" r="46" fill="none" stroke="rgba(255,255,255,.25)" stroke-width="1" stroke-dasharray="4 4"/>
      <path d="M50,72 C50,72 26,56 26,40 C26,31 33,27 39,27 C45,27 50,33 50,38 C50,33 55,27 61,27 C67,27 74,31 74,40 C74,56 50,72 50,72 Z" fill="#fff" opacity=".92"/>
    </svg>
  </div>
  <div class="hint" id="hint"></div>
</div>

<div id="flash"></div>

<script>
/* ===== ★ ตั้งค่า — แก้ข้อความ / รูป ★ ===== */
const TITLE = "เค้ามาง้อๆน้า เบ้บ";
const SUB   = "เบ้บเค้ารักเบ้บมากๆ เลยนะ รักที่สุดในโลกเลยยยยย ถึงเมื่อคืนจะ ไม่ได้ บอกฝันดีจิงแล้ว เค้าแกล้งเบ้บเฉยๆ มาทำอะไรเซอร์ไพร้ เล็กๆ แหะๆ💖";
const HINT  = "กดที่ซองสิ 💌";
/* ขนาดตัวอักษร: พิมพ์แค่ตัวเลข (หน่วย pt) — ใส่ 0 เพื่อใช้ขนาดอัตโนมัติตามจอ */
const TITLE_SIZE = 72;   // เช่น 32 = 32pt
const SUB_SIZE   = 32;   // เช่น 16 = 16pt
const HINT_SIZE  = 32;   // เช่น 20 = 20pt — ขนาดตัวอักษร "กดที่ซองสิ"
document.getElementById('title').textContent = TITLE;
document.getElementById('sub').textContent   = SUB;
document.getElementById('hint').textContent  = HINT;
if (TITLE_SIZE > 0) document.getElementById('title').style.fontSize = TITLE_SIZE + 'pt';
if (SUB_SIZE   > 0) document.getElementById('sub').style.fontSize   = SUB_SIZE + 'pt';
if (HINT_SIZE  > 0) document.getElementById('hint').style.fontSize  = HINT_SIZE + 'pt';
/* เปลี่ยนรูปพื้นหลัง: แทนไฟล์ bg.jpg (แนวนอน ความละเอียดสูง) */

/* โหลดรูป + กันแคช */
const _src = "url('bg.jpg?t=" + Date.now() + "')";
document.getElementById('bg').style.backgroundImage = _src;
document.getElementById('bgBlur').style.backgroundImage = _src;

/* ===== ภาพขยับตามเมาส์ (parallax) ===== */
const bgEl=document.getElementById('bg');
let mx=0,my=0,pxx=0,pyy=0;
addEventListener('mousemove',e=>{mx=(e.clientX/innerWidth-.5);my=(e.clientY/innerHeight-.5);});
addEventListener('mouseleave',()=>{mx=0;my=0;});
(function pl(){pxx+=(mx-pxx)*.045;pyy+=(my-pyy)*.045;   // หน่วงต่ำ = ไหลนุ่ม
  bgEl.style.transform=`translate3d(${-pxx*34}px, ${-pyy*24}px, 0) scale(1.08)`;
  requestAnimationFrame(pl);})();

/* ===== เปิดซอง -> ทรานซิชั่นเข้าเว็บ ===== */
const intro=document.getElementById('intro'), env=document.getElementById('env'),
      flash=document.getElementById('flash'), hint=document.getElementById('hint');
let opened=false;
const cardSound=new Audio('card.mp3');
const bgMusic=new Audio('music.mp3'); bgMusic.loop=true;
function openEnvelope(){
  if(opened)return; opened=true;
  env.classList.add('open');
  hint.style.opacity=0;
  cardSound.play();
  bgMusic.play().catch(()=>{});   // เล่นพร้อม gesture เดียวกัน กัน Safari บล็อก autoplay
  setTimeout(()=>flash.classList.add('go'), 950);     // แฟลชนุ่ม
  setTimeout(()=>{ intro.classList.add('gone'); document.body.classList.add('entered'); }, 1250);
  setTimeout(()=>{ intro.style.display='none'; }, 2100);
}
intro.addEventListener('click', openEnvelope);

/* ===== โบเก้ + ฝุ่นดาว + ดาวตก + ประกายตอนคลิก ===== */
const cv=document.getElementById('bokeh'),ctx=cv.getContext('2d');
let W,H,dpr,bokeh,dust,shooters=[],sparks=[];
function orb(){const s=document.createElement('canvas');s.width=s.height=64;const c=s.getContext('2d');
  const g=c.createRadialGradient(32,32,0,32,32,32);
  g.addColorStop(0,'rgba(255,255,255,0.95)');g.addColorStop(.25,'rgba(255,240,250,0.5)');g.addColorStop(1,'rgba(255,240,250,0)');
  c.fillStyle=g;c.beginPath();c.arc(32,32,32,0,7);c.fill();return s;}
const ORB=orb();
function resize(){
  cv.style.left='0';cv.style.top='0';cv.style.width='100%';cv.style.height='100%';
  dpr=Math.min(devicePixelRatio||1,2);W=cv.clientWidth;H=cv.clientHeight;
  cv.width=W*dpr;cv.height=H*dpr;ctx.setTransform(dpr,0,0,dpr,0,0);
  bokeh=Array.from({length:Math.min(32,Math.floor(W/46))},()=>({x:Math.random()*W,y:Math.random()*H,r:30+Math.random()*120,
    vy:-(0.05+Math.random()*0.22),vx:(-0.08+Math.random()*0.16),a:0.05+Math.random()*0.20,ph:Math.random()*6.28,sp:0.3+Math.random()*0.6}));
  dust=Array.from({length:Math.min(150,Math.floor(W/7))},()=>({x:Math.random()*W,y:Math.random()*H,r:0.6+Math.random()*1.6,
    vy:-(0.08+Math.random()*0.22),vx:(-0.05+Math.random()*0.1),ph:Math.random()*6.28,sp:1+Math.random()*2}));}
resize();addEventListener('resize',resize);
/* ดาวตกเกิดต่อเนื่องเรื่อยๆ ในกรอบรูป */
setInterval(()=>{const n=Math.random()<0.4?2:1;for(let k=0;k<n;k++)shooters.push({x:Math.random()*W,y:Math.random()*H*0.6,vx:6+Math.random()*6,vy:2.6+Math.random()*2.8,life:1,len:14+Math.random()*8});},620);
let t=0;
function draw(){t+=0.02;ctx.clearRect(0,0,W,H);ctx.globalCompositeOperation='lighter';
  for(const b of bokeh){b.x+=b.vx;b.y+=b.vy;if(b.y<-b.r){b.y=H+b.r;b.x=Math.random()*W;}
    ctx.globalAlpha=Math.max(0,b.a*(0.6+0.4*Math.sin(t*b.sp+b.ph)));ctx.drawImage(ORB,b.x-b.r,b.y-b.r,b.r*2,b.r*2);}
  for(const d of dust){d.x+=d.vx;d.y+=d.vy;if(d.y<-4){d.y=H+4;d.x=Math.random()*W;}
    ctx.globalAlpha=0.3+0.7*Math.abs(Math.sin(t*d.sp+d.ph));ctx.drawImage(ORB,d.x-d.r*3,d.y-d.r*3,d.r*6,d.r*6);}
  for(let i=sparks.length-1;i>=0;i--){const s=sparks[i];s.x+=s.vx;s.y+=s.vy;s.vy+=0.02;s.life-=0.012;
    if(s.life<=0){sparks.splice(i,1);continue;}ctx.globalAlpha=Math.max(0,s.life);const r=s.r*(0.5+s.life);ctx.drawImage(ORB,s.x-r,s.y-r,r*2,r*2);}
  ctx.globalAlpha=1;
  for(let i=shooters.length-1;i>=0;i--){const sh=shooters[i];sh.x+=sh.vx;sh.y+=sh.vy;sh.life-=0.011;
    const L=sh.len||16,tx=sh.x-sh.vx*L,ty=sh.y-sh.vy*L;const g=ctx.createLinearGradient(sh.x,sh.y,tx,ty);
    g.addColorStop(0,`rgba(255,252,255,${Math.max(0,sh.life)})`);g.addColorStop(1,'rgba(255,252,255,0)');
    ctx.strokeStyle=g;ctx.lineWidth=1.4;ctx.lineCap='round';ctx.beginPath();ctx.moveTo(sh.x,sh.y);ctx.lineTo(tx,ty);ctx.stroke();
    const hr=4*sh.life;ctx.globalAlpha=Math.max(0,sh.life);ctx.drawImage(ORB,sh.x-hr,sh.y-hr,hr*2,hr*2);ctx.globalAlpha=1;
    if(sh.life<=0||sh.x>W+40||sh.y>H+40)shooters.splice(i,1);}
  ctx.globalCompositeOperation='source-over';requestAnimationFrame(draw);}
requestAnimationFrame(draw);

/* คลิกในเว็บ = ประกายแตก */
addEventListener('click',e=>{if(!document.body.classList.contains('entered'))return;
  const r=cv.getBoundingClientRect();const cx=e.clientX-r.left,cy=e.clientY-r.top;
  for(let i=0;i<26;i++){const a=Math.random()*6.28,sp=1+Math.random()*4;
    sparks.push({x:cx,y:cy,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-1,r:3+Math.random()*5,life:1});}});

/* ===== หัวใจลอยขึ้นเบาๆ (เริ่มหลังเข้าเว็บ) ===== */
const HEART='<svg width="26" height="24" viewBox="0 0 100 90"><path d="M50,80 C50,80 8,54 8,30 C8,16 20,10 30,10 C40,10 50,20 50,28 C50,20 60,10 70,10 C80,10 92,16 92,30 C92,54 50,80 50,80 Z" fill="none" stroke="rgba(255,225,240,.85)" stroke-width="6"/></svg>';
setInterval(()=>{
  if(!document.body.classList.contains('entered'))return;
  if(document.querySelectorAll('.fheart').length>10)return;
  const h=document.createElement('div');h.className='fheart';h.innerHTML=HEART;
  const size=14+Math.random()*22;h.style.width=size+'px';
  h.style.left=(Math.random()*100)+'vw';
  const dur=(6+Math.random()*4);
  h.animate([{transform:'translateY(0) rotate(0deg)',opacity:0},
             {opacity:.9,offset:.15},
             {transform:'translateY(-112vh) rotate('+(-20+Math.random()*40)+'deg)',opacity:0}],
            {duration:dur*1000,easing:'ease-out'});
  document.body.appendChild(h);
  setTimeout(()=>h.remove(),dur*1000+100);
},1100);
</script>
</body>
</html>
